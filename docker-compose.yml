version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flask_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Монтируем скрипт инициализации БД
      - ./init-scripts:/docker-entrypoint-initdb.d
    # Проверка готовности БД принимать подключения
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: flask_redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  app:
    build: .
    container_name: flask_app
    ports:
      - "5000:5000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    # Политика автоматического перезапуска при падении приложения
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy # Ждет, пока БД пройдет healthcheck
      redis:
        condition: service_started
    networks:
      - app-network

  adminer:
    image: adminer:latest
    container_name: flask_adminer
    ports:
      - "8080:8080"
    profiles:
      - dev
    networks:
      - app-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: flask_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    profiles:
      - dev
    depends_on:
      - redis
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge