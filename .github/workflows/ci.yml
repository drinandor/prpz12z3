name: CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  ci-build-and-test:
    runs-on: ubuntu-latest

    # Временные сервисы (контейнеры), которые запустятся в облаке GitHub для тестов
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: db_user
          POSTGRES_PASSWORD: secure_password
          POSTGRES_DB: visits_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Скачивание исходного кода проекта
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Творческое задание: Проверка Dockerfile линтером Hadolint
      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008 # Игнорировать предупреждение о версиях apt-пакетов

      # 3. Установка Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-size: '3.10'

      # 4. Установка зависимостей проекта и утилит тестирования
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r requirements.txt

      # 5. Запуск линтера Flake8 для проверки стиля кода Python
      - name: Run Linter (Flake8)
        run: |
          # Игнорируем ограничение длины строки E501 для простоты
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # 6. Запуск юнит-тестов (используя запущенные сервисы postgres и redis)
      - name: Run Unit Tests (Pytest)
        env:
          POSTGRES_USER: db_user
          POSTGRES_PASSWORD: secure_password
          POSTGRES_DB: visits_db
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          pytest test_app.py -v

      # 7. Сборка Docker-образа приложения
      - name: Build Docker Image
        run: |
          docker build -t flask-app:latest .

      # 8. Творческое задание: Отправка уведомления в Telegram при УСПЕШНОЙ сборке
      - name: Send Telegram Success Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ CI Pipeline SUCCEEDED!
            ---------------------------
            Project: Flask Visitor Counter
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Author: ${{ github.actor }}

      # 9. Творческое задание: Отправка уведомления в Telegram при ПРОВАЛЕ сборки
      - name: Send Telegram Failure Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ CI Pipeline FAILED!
            ---------------------------
            Project: Flask Visitor Counter
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Author: ${{ github.actor }}